version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - npm ci --omit=dev --prefix backend
        - npm ci --prefix frontend
    build:
      commands:
        - npm run build:amplify
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - backend/node_modules/**/*
      - frontend/node_modules/**/*
